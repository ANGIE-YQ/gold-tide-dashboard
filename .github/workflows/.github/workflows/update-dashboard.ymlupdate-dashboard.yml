name: Update Gold Tide Dashboard

on:
  schedule:
    # 每日北京时间 15:30 (UTC 07:30) — 上期所收盘后
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy pandas matplotlib scikit-learn xgboost

      - name: Refresh Dashboard
        run: python refresh_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data.js gold_AU0_daily.csv gold_features.csv gold_tide_calibrated_model.pkl
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: refresh dashboard $(date +'%Y-%m-%d')"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
